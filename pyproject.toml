[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4", "SIM", "RUF"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
filterwarnings = [
    # Ignore deprecation warning from slowapi (latest 0.1.9 uses asyncio.iscoroutinefunction)
    "ignore:'asyncio.iscoroutinefunction' is deprecated:DeprecationWarning",
]
